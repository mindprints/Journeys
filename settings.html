<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Journeys</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="./css/editor.css">
  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: 'Saira', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #fff;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    h1 i { color: #888; }
    section { margin-bottom: 2rem; }
    h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
      margin-bottom: 0.8rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #333;
    }
    .field { margin-bottom: 0.9rem; }
    label {
      display: block;
      font-size: 0.85rem;
      color: #bbb;
      margin-bottom: 0.3rem;
    }
    label span.required { color: #e07070; margin-left: 0.2em; }
    label span.hint {
      font-size: 0.75rem;
      color: #666;
      margin-left: 0.4em;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: #0d0d1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 0.45rem 0.7rem;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #6060cc;
    }
    .actions {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      margin-top: 1.5rem;
    }
    button {
      padding: 0.55rem 1.4rem;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    .btn-save { background: #4a4aaa; color: #fff; }
    .btn-close { background: #333; color: #bbb; }
    #status {
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      display: none;
    }
    #status.ok  { display: inline-block; background: #1a3a1a; color: #6c6; }
    #status.err { display: inline-block; background: #3a1a1a; color: #e77; }
    .grab-status {
      font-size: 0.8rem;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      margin-bottom: 1rem;
    }
    .grab-status.bundled { background: #1a3a1a; color: #6c6; }
    .grab-status.python  { background: #1a2a3a; color: #79c; }
    .grab-status.unavailable { background: #3a1a1a; color: #e77; }
  </style>
</head>
<body>
  <h1><i class="fas fa-cog"></i> Settings</h1>

  <div id="grab-status-bar" class="grab-status" style="display:none"></div>

  <section>
    <h2>OpenRouter API</h2>
    <div class="field">
      <label>API Key <span class="required">*</span></label>
      <input type="password" id="key-openrouter" autocomplete="off" placeholder="sk-or-…">
    </div>
    <div class="field">
      <label>Content Model <span class="hint">default: openai/gpt-4o-mini</span></label>
      <input type="text" id="key-content-model" placeholder="openai/gpt-4o-mini">
    </div>
    <div class="field">
      <label>Image Model <span class="hint">default: google/gemini-3.1-flash-image-preview</span></label>
      <input type="text" id="key-image-model" placeholder="google/gemini-3.1-flash-image-preview">
    </div>
    <div class="field">
      <label>Topic Suggestion Model <span class="hint">optional</span></label>
      <input type="text" id="key-topic-model" placeholder="minimax/minimax-m2.7">
    </div>
  </section>

  <section>
    <h2>Brave Search <span style="font-weight:400; text-transform:none; letter-spacing:0;">(optional — image + text fallback)</span></h2>
    <div class="field">
      <label>API Key</label>
      <input type="password" id="key-brave" autocomplete="off" placeholder="BSA…">
    </div>
  </section>

  <section>
    <h2>Openverse <span style="font-weight:400; text-transform:none; letter-spacing:0;">(optional — open-license images)</span></h2>
    <div class="field">
      <label>Client ID</label>
      <input type="text" id="key-openverse-id" placeholder="your_client_id">
    </div>
    <div class="field">
      <label>Client Secret</label>
      <input type="password" id="key-openverse-secret" autocomplete="off" placeholder="your_client_secret">
    </div>
  </section>

  <div class="actions">
    <button class="btn-save" id="btn-save"><i class="fas fa-save"></i> Save</button>
    <button class="btn-close" id="btn-close">Close</button>
    <span id="status"></span>
  </div>

  <script src="js/settings.js"></script>
</body>
</html>
